name: VKSelfCode
options:
  bundleIdPrefix: dev.selfcode
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  VKID:
    url: https://github.com/VKCOM/vkid-ios-sdk.git
    from: 2.2.0

settings:
  base:
    SWIFT_VERSION: 5.0
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    CURRENT_PROJECT_VERSION: 3
    MARKETING_VERSION: 0.1.2
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

targets:
  VKSelfCode:
    type: application
    platform: iOS
    sources:
      - path: VKSelfCode
        excludes:
          - Resources/Info.plist
          - Resources/LegacyIcons
      - path: VKSelfCode/Resources/LegacyIcons/AppIcon60x60@2x.png
        buildPhase: resources
      - path: VKSelfCode/Resources/LegacyIcons/AppIcon60x60@3x.png
        buildPhase: resources
    info:
      path: VKSelfCode/Resources/Info.plist
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.selfcode.vk
        PRODUCT_NAME: VKSelfCode
        INFOPLIST_FILE: VKSelfCode/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    dependencies:
      - package: VKID
        product: VKID
    scheme:
      testTargets: []
      gatherCoverageData: false
